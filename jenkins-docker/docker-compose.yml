# 1) Obtén el GID del socket Docker:
#    Linux: getent group docker | cut -d: -f3
#    Docker Desktop (Windows/Mac): docker run --rm -v /var/run/docker.sock:/var/run/docker.sock alpine sh -c "stat -c '%g' /var/run/docker.sock"
#    (suele ser 0 en Docker Desktop)
#
# 2) Crea jenkins-docker/.env con:
#    DOCKER_GID=XXX
#
# 3) Reconstruye y levanta (obligatorio tras cambiar DOCKER_GID):
#    docker compose build --no-cache
#    docker compose up -d

services:
  jenkins:
    build:
      context: .
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    image: ecommerce-jenkins:lts
    container_name: ecommerce-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      TZ: UTC
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
