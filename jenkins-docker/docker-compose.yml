services:
  jenkins:
    build:
      context: .
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    image: ecommerce-jenkins:lts
    container_name: ecommerce-jenkins
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      TZ: UTC
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
