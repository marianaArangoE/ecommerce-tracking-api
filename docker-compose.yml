services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-tracking-api
    env_file:
      - .env
    environment:
      # Solo lo que debe forzar Compose; el resto lo define .env tal cual.
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    profiles:
      - local-mongo
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo_data:
